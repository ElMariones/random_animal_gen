<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Critter Forge · Random Animal Generator</title>
  <meta name="description" content="Spin up a brand-new creature, part by part, from hundreds of real animals. Filter by type, then forge your chimera." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐾</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Fresca&family=Handjet:wght,ELSH@100..900,2&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="orbs" aria-hidden="true">
    <span class="orb orb-a"></span>
    <span class="orb orb-b"></span>
    <span class="orb orb-c"></span>
  </div>

  <main class="wrap">
    <header class="hero">
      <h1 class="title">🐾 Random Animal Generator</h1>
      <p class="byline">inspired by <a href="https://github.com/gracewqma/TuimizRandonAnimalGenerator" target="_blank" rel="noopener">Tuimiz</a> · web by <a href="https://instagram.com/mariolandaburu" target="_blank" rel="noopener">Mario&nbsp;Landáburu</a></p>
      <p class="subtitle">Tap any row to roll it. Built from <strong id="animalCount">685</strong>+ animals and beings.</p>
    </header>

    <section class="panel types" aria-label="Animal type filter">
      <div class="types-head">
        <span class="types-title">Include animal types</span>
        <button id="selectAll" class="toggle-all is-on" type="button" aria-pressed="true">
          <span class="dot"></span> Select all
        </button>
      </div>
      <div id="typeChips" class="chips"></div>
    </section>

    <div class="controls">
      <button id="clearBtn" class="btn btn-ghost" type="button">
        <span class="btn-emoji">↺</span> Clear
      </button>
      <a href="/creations" class="btn btn-primary" id="viewCreations">
        <svg class="art-ico" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M16 3.5C9 3.5 3.3 8.7 3.3 15.1c0 5.2 4.2 8.4 8.4 8.4 1.7 0 2.7-1.1 2.7-2.5 0-.6-.2-1-.2-1.6 0-1.2.9-2 2.1-2h2.2c3.8 0 7.2-2.9 7.2-7C25.7 7.2 21.4 3.5 16 3.5Z" fill="#fff" stroke="#2a2622" stroke-width="2" stroke-linejoin="round"/>
          <circle cx="9" cy="15" r="1.7" fill="#4a85e8"/>
          <circle cx="12.3" cy="9.8" r="1.7" fill="#2e9d5b"/>
          <circle cx="18" cy="8.6" r="1.7" fill="#ff5a16"/>
          <circle cx="22" cy="13" r="1.7" fill="#f2c14e"/>
        </svg> View creations
      </a>
    </div>

    <p id="hint" class="hint" hidden></p>

    <div class="stage">
      <span class="deco deco-left" aria-hidden="true"></span>
      <section id="slots" class="slots" aria-label="Generated creature"></section>
      <span class="deco deco-right" aria-hidden="true"></span>
    </div>

    <footer class="foot">
      <span>Tap a row to roll · tap the name to copy · <span class="kbd">🎲</span> rerolls · <span class="kbd">🔍</span> Google Images</span>
    </footer>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <!-- React powers the category-themed roll animations (see fx.js) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script type="module" src="app.js"></script>

  <!-- Vercel Web Analytics (buildless / "Other" framework integration) -->
  <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
